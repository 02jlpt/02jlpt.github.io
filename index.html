<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MIMIKARA OBOERU N3 - OpenQuiz Flashcard</title>
    <!-- Thư viện biểu tượng FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #0f0f11;
            color: #e3e3e6;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
            user-select: none;
        }

        /* Tiêu đề giáo trình phía trên */
        .deck-title {
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #66666e;
            margin-bottom: 5px;
            font-weight: 600;
        }
        .counter-text {
            font-size: 13px;
            color: #44444a;
            margin-bottom: 25px;
        }

        /* Khung bao quanh thẻ tạo hiệu ứng 3D */
        .card-container {
            width: 580px;
            height: 340px;
            perspective: 1000px;
            cursor: pointer;
        }

        /* Thẻ Flashcard chính */
        .card {
            width: 100%;
            height: 100%;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .card.flipped {
            transform: rotateY(180deg);
        }

        /* Thiết kế mặt trước và mặt sau */
        .front, .back {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            border-radius: 24px;
            background-color: #18181c;
            border: 1px solid #232329;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            box-sizing: border-box;
            padding: 40px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.6);
        }

        .back {
            transform: rotateY(180deg);
            background-color: #131316;
            border-color: #1f1f24;
        }

        /* Định dạng chữ tiếng Nhật ở giữa mặt trước */
        .word-main {
            font-size: 48px;
            font-weight: 700;
            color: #ffffff;
            margin-bottom: 12px;
            letter-spacing: 0.5px;
        }

        .word-sub {
            font-size: 16px;
            color: #72727e;
            font-style: italic;
        }

        /* Định dạng nghĩa tiếng Việt ở mặt sau */
        .meaning-main {
            font-size: 34px;
            color: #ffffff;
            font-weight: 700;
            margin-bottom: 20px;
        }
        
        .example-area {
            text-align: center;
            max-width: 90%;
            line-height: 1.6;
        }
        .example-ja {
            font-size: 18px;
            color: #a1a1aa;
            margin-bottom: 4px;
        }

        /* Các nút Icon chức năng ở góc */
        .icon-btn {
            position: absolute;
            color: #4c4c54;
            font-size: 18px;
            transition: color 0.2s, transform 0.1s;
            padding: 12px;
        }
        .icon-btn:hover {
            color: #9a9a16;
            transform: scale(1.05);
        }
        .top-left { top: 24px; left: 28px; }
        .top-right { top: 24px; right: 28px; }
        .bottom-left { bottom: 24px; left: 28px; }
        .bottom-right { bottom: 24px; right: 28px; }

        /* Hướng dẫn phím tắt phía dưới */
        .controls-hint {
            margin-top: 35px;
            font-size: 12px;
            color: #44444a;
            letter-spacing: 0.5px;
        }
        .key {
            background-color: #18181c;
            color: #72727e;
            padding: 3px 7px;
            border-radius: 5px;
            font-size: 11px;
            border: 1px solid #232329;
            margin: 0 3px;
            font-weight: 600;
        }
    </style>
</head>
<body>

    <!-- Tiêu đề bộ thẻ -->
    <div class="deck-title">Mimikara Oboeru N3</div>
    <div class="counter-text" id="card-counter">Thẻ 1 / 5</div>

    <!-- Khung Flashcard -->
    <div class="card-container" onclick="toggleFlip()">
        <div class="card" id="flashcard">
            
            <!-- MẶT TRƯỚC -->
            <div class="front">
                <div class="icon-btn top-left"><i class="fa-solid fa-sliders"></i></div>
                <div class="icon-btn top-right"><i class="fa-solid fa-star"></i></div>
                
                <div class="word-main" id="front-text">渇く (かわく)</div>
                <div class="word-sub" id="front-sub">verb - kawaku</div>
                
                <div class="icon-btn bottom-left" onclick="speakWord(event)"><i class="fa-solid fa-volume-high"></i></div>
                <div class="icon-btn bottom-right"><i class="fa-solid fa-microphone"></i></div>
            </div>

            <!-- MẶT SAU -->
            <div class="back">
                <div class="meaning-main" id="back-meaning">Khát nước, khô nẻ</div>
                <div class="example-area">
                    <div class="example-ja" id="back-ex-ja">のどが渇いた。</div>
                </div>
            </div>

        </div>
    </div>

    <!-- Thanh phím tắt điều hướng -->
    <div class="controls-hint">
        Phím tắt: <span class="key">←</span> <span class="key">→</span> để chuyển thẻ • <span class="key">Space</span> / <span class="key">Enter</span> để lật thẻ
    </div>

    <script>
        // Dữ liệu từ vựng thực tế lấy từ trang bạn đang xem
        const vocabulary = [
            { kanji: "渇く（かわく）", sub: "verb - kawaku", meaning: "Khát nước, khô nẻ", exJa: "のどが渇いた。" },
            { kanji: "嗅ぐ（かぐ）", sub: "verb - kagu", meaning: "Ngửi", exJa: "花のにおいをかぐ。" },
            { kanji: "叩く（たたく）", sub: "verb - tataku", meaning: "Vỗ, đánh", exJa: "ドアをたたく。" },
            { kanji: "殴る（なぐる）", sub: "verb - naguru", meaning: "Đấm", exJa: "けんかして相手をなぐった。" },
            { kanji: "蹴る（ける）", sub: "verb - keru", meaning: "Đá", exJa: "ボールをける。" }
        ];

        let currentIndex = 0;
        const cardElement = document.getElementById('flashcard');

        function toggleFlip() {
            cardElement.classList.toggle('flipped');
        }

        function updateCard() {
            cardElement.classList.remove('flipped');
            
            setTimeout(() => {
                const currentWord = vocabulary[currentIndex];
                document.getElementById('front-text').innerText = currentWord.kanji;
                document.getElementById('front-sub').innerText = currentWord.sub;
                document.getElementById('back-meaning').innerText = currentWord.meaning;
                document.getElementById('back-ex-ja').innerText = currentWord.exJa;
                document.getElementById('card-counter').innerText = `Thẻ ${currentIndex + 1} / ${vocabulary.length}`;
            }, 150);
        }

        function speakWord(event) {
            event.stopPropagation();
            const text = vocabulary[currentIndex].kanji.split('（')[0];
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'ja-JP';
            window.speechSynthesis.speak(utterance);
        }

        document.addEventListener('keydown', function(event) {
            if (event.code === 'Space' || event.key === 'Enter') {
                event.preventDefault();
                toggleFlip();
            } else if (event.key === 'ArrowRight') {
                currentIndex = (currentIndex + 1) % vocabulary.length;
                updateCard();
            } else if (event.key === 'ArrowLeft') {
                currentIndex = (currentIndex - 1 + vocabulary.length) % vocabulary.length;
                updateCard();
            }
        });
    </script>
</body>
</html>
